services:
  - type: web
    name: expense-tracker
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: expense-tracker-db
          property: connectionString
      - key: NODE_VERSION
        value: 20

databases:
  - name: expense-tracker-db
    plan: free
